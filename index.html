<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#FAFBFA" />
    <meta name="rt-build" content="2026-06-11.1" />
    <title>Retayned</title>
    <script>
      console.log("Retayned build 2026-06-11.1");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* White-screen watchdog (Jun 2026). If the main bundle itself 404s
         after a deploy (restored tab + stale cached HTML), no JS ever
         runs, so the in-app self-heal can't fire and #root stays empty
         forever. This inline script needs no bundle: after 6s, if the
         root is still empty, force one reload to fetch fresh HTML.
         Session-guarded against loops. The 6s grace is generous — when
         JS is healthy the loading screen mounts in well under a second. */
      (function () {
        try {
          var k = "rt:wsReloadAt";
          var last = Number(sessionStorage.getItem(k) || 0);
          setTimeout(function () {
            var r = document.getElementById("root");
            if (r && r.childElementCount === 0 && Date.now() - last > 60000) {
              sessionStorage.setItem(k, String(Date.now()));
              location.reload();
            }
          }, 6000);
        } catch (e) { /* sessionStorage unavailable — do nothing */ }
      })();
    </script>
  </body>
</html>
