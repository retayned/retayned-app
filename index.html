<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="retayned-build" content="2026-06-12.1" />
    <title>Retayned</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Warm the Supabase connection during HTML parse: DNS+TLS finish
         before the bundle's first auth call needs them (~100-300ms saved
         on mobile radio). -->
    <link rel="preconnect" href="https://vwwezynzqvzlmebkmang.supabase.co" crossorigin />
    <script>console.log("Retayned build 2026-06-12.1");window.__RETAYNED_BUILD__="2026-06-12.1";</script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <!-- Boot splash: #root is empty until the JS bundle parses and React
           mounts — on mobile that's several seconds. Show the logo + a subtle
           spinner IMMEDIATELY (no delay) so the user sees branding, not blank.
           React replaces all of #root on mount, removing this automatically. -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#FAFAF7;">
        <img src="/favicon.png" alt="Retayned" width="52" height="52" style="border-radius:13px;" />
        <div style="width:26px;height:26px;border:2.5px solid rgba(51,84,62,0.18);border-top-color:#33543E;border-radius:50%;animation:bootspin 0.7s linear infinite;"></div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      /* White-screen watchdog (Jun 2026; retuned Jul 2026). If the main
         bundle 404s after a deploy (restored tab + stale cached HTML), no
         JS ever runs and #root stays empty forever — reload once to fetch
         fresh HTML.
         THE JUL 2026 FIX: the old check was "splash still visible after
         6s", which is REACT MOUNTED, not BUNDLE RAN. On a slow mobile
         connection a healthy first load (260KB gz download + parse) can
         legitimately take >6s — and the watchdog then force-reloaded a
         perfectly good boot, restarting the download and doubling the
         load time. Now main.jsx sets window.__RT_JS_EXECUTED__ the moment
         the bundle executes; the watchdog fires only when that flag never
         appears (the true 404 case), and it waits 12s. A slow boot is
         slow; only a dead boot reloads. */
      (function () {
        try {
          var k = "rt:wsReloadAt";
          var last = Number(sessionStorage.getItem(k) || 0);
          setTimeout(function () {
            if (!window.__RT_JS_EXECUTED__ && Date.now() - last > 60000) {
              sessionStorage.setItem(k, String(Date.now()));
              location.reload();
            }
          }, 12000);
        } catch (e) { /* sessionStorage unavailable */ }
      })();
    </script>
  </body>
</html>
