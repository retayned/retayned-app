<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Retayned</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>console.log("Retayned build 2026-06-12.1");window.__RETAYNED_BUILD__="2026-06-12.1";</script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* White-screen watchdog (Jun 2026). If the main bundle 404s after a
         deploy (restored tab + stale cached HTML), no JS ever runs and
         #root stays empty forever. This inline script needs no bundle:
         after 6s, if the root is still empty, force one reload to fetch
         fresh HTML. Session-guarded against loops. */
      (function () {
        try {
          var k = "rt:wsReloadAt";
          var last = Number(sessionStorage.getItem(k) || 0);
          setTimeout(function () {
            var r = document.getElementById("root");
            if (r && r.childElementCount === 0 && Date.now() - last > 60000) {
              sessionStorage.setItem(k, String(Date.now()));
              location.reload();
            }
          }, 6000);
        } catch (e) { /* sessionStorage unavailable */ }
      })();
    </script>
  </body>
</html>
