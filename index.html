<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="retayned-build" content="2026-06-12.1" />
    <title>Retayned</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>console.log("Retayned build 2026-06-12.1");window.__RETAYNED_BUILD__="2026-06-12.1";</script>
    <script type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <!-- Boot splash: #root is empty until the JS bundle parses and React
           mounts — on mobile that's several seconds. Show the logo + a subtle
           spinner IMMEDIATELY (no delay) so the user sees branding, not blank.
           React replaces all of #root on mount, removing this automatically. -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#FAFAF7;">
        <img src="/favicon.png" alt="Retayned" width="52" height="52" style="border-radius:13px;" />
        <div style="width:26px;height:26px;border:2.5px solid rgba(51,84,62,0.18);border-top-color:#33543E;border-radius:50%;animation:bootspin 0.7s linear infinite;"></div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      /* White-screen watchdog (Jun 2026). If the main bundle 404s after a
         deploy (restored tab + stale cached HTML), no JS ever runs and
         #root stays empty forever. This inline script needs no bundle:
         after 6s, if the root is still empty, force one reload to fetch
         fresh HTML. Session-guarded against loops. */
      (function () {
        try {
          var k = "rt:wsReloadAt";
          var last = Number(sessionStorage.getItem(k) || 0);
          setTimeout(function () {
            var r = document.getElementById("root");
            // App mounted = React replaced #root's contents, so the boot-splash
            // is gone. If the splash is still present after 6s, the bundle
            // never ran (e.g. 404'd after a deploy) — force one fresh reload.
            var stillBooting = r && document.getElementById("boot-splash");
            if (stillBooting && Date.now() - last > 60000) {
              sessionStorage.setItem(k, String(Date.now()));
              location.reload();
            }
          }, 6000);
        } catch (e) { /* sessionStorage unavailable */ }
      })();
    </script>
  </body>
</html>
